<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaJá - Finalizar Reserva</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">ReservaJá</div>
        <nav>
            <a href="index.html">Início</a>
            <a href="login.html">Login</a>
            <a href="reservas.html" class="ativo">Reservar</a>
            <a href="acessos.php">Acessos</a>
        </nav>
    </header>

    <main class="conteudo-principal">
        <section class="banner-pesquisa">
            <h2>Dados do Cliente e Pagamento</h2>
            <p>Insira os seus dados para armazenar a reserva com segurança no servidor.</p>

            <form class="form-pesquisa" method="POST" action="novareserva.php">
                <div class="grupo-input">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome aqui" required>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail de Contacto</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@isep.ipp.pt" required>
                </div>

                <div class="grupo-input">
                    <label for="tipo">Tipo de Reserva</label>
                    <select id="tipo" name="tipo">
                        <option value="hotel">Hotel / Alojamento</option>
                        <option value="voo">Voo / Viagem</option>
                        <option value="evento">Evento / Concerto</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label for="destino">Destino / Evento</label>
                    <input type="text" id="destino" name="destino" placeholder="Ex: Porto" required>
                </div>

                <div class="grupo-input">
                    <label for="data">Data</label>
                    <input type="date" id="data" name="data" required>
                </div>

                <div class="grupo-input">
                    <label for="pagamento">Método de Pagamento</label>
                    <select id="pagamento" name="pagamento">
                        <option value="cc">Cartão de Crédito</option>
                        <option value="mb">Multibanco</option>
                        <option value="mbway">MB WAY</option>
                    </select>
                </div>

                <button type="submit" class="btn-procurar">Confirmar e Pagar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - P02 - Sistemas de Reservas Online | DEAPC - ISEP</p>
    </footer>
</body>
</html>
