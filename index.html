<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaJá - O seu Sistema de Reservas</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>ReservaJá</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="destaques.html">Destaques</a></li>
                <li><a href="reserva.html">Fazer Reserva</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Encontre a sua próxima reserva</h2>
            <form action="resultados.html" method="GET">
                <label for="destino">Destino/Serviço:</label>
                <input type="text" id="destino" name="destino" placeholder="Para onde quer ir?">

                <label for="data-entrada">Data de Entrada:</label>
                <input type="date" id="data-entrada" name="data_entrada">

                <label for="data-saida">Data de Saída:</label>
                <input type="date" id="data-saida" name="data_saida">

                <button type="submit">Pesquisar</button>
            </form>
        </section>

        <section>
            <h2>Destinos Populares</h2>
            <article>
                <h3>Hotel Paraíso - Algarve</h3>
                <img src="images/hotel-algarve.jpg" alt="Vista do Hotel Paraíso no Algarve">
                <p>Reserve já com 20% de desconto!</p>
                <a href="reserva.html">Reservar Agora</a>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2025/26 Grupo X - Sistemas de Reserva Online</p>
    </footer>

    <script src="scripts/main.js"></script>
</body>
</html>
